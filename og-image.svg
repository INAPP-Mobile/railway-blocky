<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="200" fill="#6366f1" opacity="0.06"/>
  <circle cx="150" cy="500" r="150" fill="#22d3ee" opacity="0.05"/>
  <!-- Shield icon (large) -->
  <g transform="translate(180,200)">
    <path d="M0 -100 L-85 -55 L-85 30 Q-85 100 0 145 Q85 100 85 30 L85 -55 Z"
          fill="none" stroke="url(#shield)" stroke-width="6" stroke-linejoin="round"/>
    <path d="M-42 -15 L-15 20 L42 -35" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-35" cy="-72" r="5" fill="#22d3ee" opacity="0.6"/>
    <circle cx="0" cy="-82" r="5" fill="#22d3ee" opacity="0.8"/>
    <circle cx="35" cy="-72" r="5" fill="#22d3ee" opacity="0.6"/>
  </g>
  <text x="330" y="260" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="68" font-weight="700">Blocky</text>
  <text x="330" y="330" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="34" font-weight="400">Deploy on Railway</text>
  <text x="330" y="380" fill="#64748b" font-family="system-ui, sans-serif" font-size="22">DNS ad-blocker &amp; privacy tool</text>
  <!-- Feature pills -->
  <rect x="100" y="440" rx="20" width="200" height="44" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="468" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="15" font-weight="600">6.7K ★ GitHub</text>
  <rect x="320" y="440" rx="20" width="200" height="44" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="420" y="468" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Apache-2.0</text>
  <rect x="540" y="440" rx="20" width="200" height="44" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="640" y="468" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="15" font-weight="600">~20 MB Image</text>
  <rect x="760" y="440" rx="20" width="200" height="44" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="860" y="468" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Zero DB Deps</text>
</svg>
