<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#060910"/></linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#6366F1"/></linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#818CF8"/></linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <circle cx="400" cy="400" r="195" stroke="#22D3EE" stroke-width="1.5" opacity="0.1"/>
  <!-- Shield -->
  <g transform="translate(400,390)">
    <path d="M-140,-180 L140,-180 L140,20 Q140,150 0,200 Q-140,150 -140,20 Z" fill="url(#shield)" opacity="0.7"/>
    <path d="M-120,-160 L120,-160 L120,20 Q120,130 0,175 Q-120,130 -120,20 Z" fill="none" stroke="#67E8F9" stroke-width="2" opacity="0.2"/>
    <!-- Checkmark -->
    <path d="M-50,10 L-15,45 L55,-25" stroke="url(#check)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>